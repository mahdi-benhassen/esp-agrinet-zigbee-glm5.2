name: Build Firmware

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------------
  # Build the gateway host firmware (ESP32-S3)
  # ----------------------------------------------------------------------
  build-gateway:
    name: Gateway (ESP32-S3)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build gateway
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32s3
          path: gateway

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gateway-esp32s3-firmware
          path: |
            gateway/build/esp_agrinet_gateway.bin
            gateway/build/bootloader/bootloader.bin
            gateway/build/partition_table/partition-table.bin
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # Build the sensor node firmware (ESP32-H2)
  # ----------------------------------------------------------------------
  build-sensor-node:
    name: Sensor Node (ESP32-H2)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sensor node
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32h2
          path: nodes/sensor_node

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sensor-node-esp32h2-firmware
          path: |
            nodes/sensor_node/build/esp_agrinet_sensor_node.bin
            nodes/sensor_node/build/bootloader/bootloader.bin
            nodes/sensor_node/build/partition_table/partition-table.bin
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # Build the actuator node firmware (ESP32-H2)
  # ----------------------------------------------------------------------
  build-actuator-node:
    name: Actuator Node (ESP32-H2)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build actuator node
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32h2
          path: nodes/actuator_node

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: actuator-node-esp32h2-firmware
          path: |
            nodes/actuator_node/build/esp_agrinet_actuator_node.bin
            nodes/actuator_node/build/bootloader/bootloader.bin
            nodes/actuator_node/build/partition_table/partition-table.bin
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # Build the ESP32-H2 RCP firmware (radio coprocessor for the gateway)
  # Uses the ot_rcp example from ESP-IDF with OPENTHREAD_NCP_VENDOR_HOOK
  # ----------------------------------------------------------------------
  build-rcp:
    name: RCP (ESP32-H2 radio coprocessor)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RCP from ESP-IDF ot_rcp example
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.3
          target: esp32h2
          path: rcp
          command: >-
            cp sdkconfig.defaults /opt/esp/idf/examples/openthread/ot_rcp/sdkconfig.defaults
            && cd /opt/esp/idf/examples/openthread/ot_rcp
            && idf.py set-target esp32h2
            && idf.py build
            && mkdir -p /app/${{ github.repository }}/rcp/build
            && cp build/esp_ot_rcp.bin build/bootloader/bootloader.bin build/partition_table/partition-table.bin /app/${{ github.repository }}/rcp/build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rcp-esp32h2-firmware
          path: |
            rcp/build/esp_ot_rcp.bin
            rcp/build/bootloader.bin
            rcp/build/partition-table.bin
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # Code formatting check (lightweight, runs on host)
  # ----------------------------------------------------------------------
  lint:
    name: Lint (clang-format check)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          set -e
          FILES=$(find . -path ./build -prune -o \
                       -path ./.git -prune -o \
                       -name '*.c' -print -o -name '*.h' -print | \
                       grep -v 'build/')
          if [ -z "$FILES" ]; then
            echo "No source files to lint"
            exit 0
          fi
          echo "$FILES" | xargs clang-format --dry-run --Werror || \
            (echo "Formatting issues found. Run 'clang-format -i **/*.c **/*.h' to fix."; exit 1)

  # ----------------------------------------------------------------------
  # Aggregate job - allows branch protection to require a single job
  # ----------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-22.04
    needs: [build-gateway, build-sensor-node, build-actuator-node, build-rcp, lint]
    steps:
      - name: All builds passed
        run: echo "All firmware builds and lint checks passed."
